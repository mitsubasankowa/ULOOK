<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1366, user-scalable=no">
    <title>MIRROR RED - ULOOK</title>
    <link rel="stylesheet" href="red.css">
</head>
<body>
    <div class="bg-layer"></div>

    <div class="stage">
        <header class="nav-header">
            <a href="index.html" class="back-link">戻る</a>
        </header>

        <main>
            <section class="product-visual">
                <img src="ULOOK/red.png" class="lens-display-img" alt="ミラーレッド">
            </section>

            <section class="product-titles">
                <h1 class="name-jp">ミラーレッド</h1>
                <p class="name-en">MIRROR RED</p>
            </section>

            <section class="view-comparison" id="viewArea">
                <p class="guide-text">タップで装着ON・OFF切り替え（※画像はイメージです）</p>
                <div class="image-frame">
                    <img src="miekata/miekata_ULOOK.png" class="view-img off" alt="装着OFF">
                    <img src="miekata/miekata_ULOOK_Red.png" class="view-img on active" id="onImage" alt="装着ON">
                    
                    <div class="toggle-badge is-on" id="badge">装着ON</div>
                </div>
            </section>
        </main>

        <footer class="compatibility-box">
            <h2 class="table-caption">対応機種</h2>
            <table class="spec-table">
                <thead>
                    <tr>
                        <th style="width: 28%;">SHOEI</th>
                        <th style="width: 24%;">ARAI</th>
                        <th style="width: 24%;">OGK KABUTO</th>
                        <th style="width: 24%;">AGV</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>CWR-1 / CPB-1V<br>CWR-F2 / CWR-F2R</td>
                        <td>VAS-V MV</td>
                        <td>CF-1W</td>
                        <td>RACE3 / GT4</td>
                    </tr>
                </tbody>
            </table>
        </footer>
    </div>

    <script src="red_Js.js"></script>
</body>
</html>
