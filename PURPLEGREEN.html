<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MIRROR PURPLE GREEN - ULOOK</title>
    <link rel="stylesheet" href="purplegreen.css">
</head>
<body>
    <div class="stage">
        <header class="nav-header">
            <a href="index.html" class="back-link">戻る</a>
        </header>

        <main>
            <section class="product-visual">
                <img src="../ULOOK/purplegreen.png" class="lens-display-img" alt="ミラーパープルグリーン">
            </section>

            <section class="product-titles">
                <h1 class="name-jp">ミラーパープルグリーン</h1>
                <p class="name-en">MIRROR PURPLE GREEN</p>
            </section>

            <section class="view-comparison" id="viewArea">
                <p class="guide-text">タップで装着ON・OFF切り替え</p>
                <div class="image-frame">
                    <img src="../miekata/miekata_ULOOK.png" class="view-img off">
                    <img src="../miekata/miekata_ULOOK_GREEN.png" class="view-img on active" id="onImage">
                    <div class="toggle-badge is-on" id="badge">装着ON</div>
                </div>
            </section>

            <footer class="compatibility-box">
                <h2 class="table-caption">対応機種</h2>
                <table class="spec-table">
                    <thead>
                        <tr>
                            <th style="width: 38%;">SHOEI</th>
                            <th style="width: 31%;">ARAI</th>
                            <th style="width: 31%;">OGK KABUTO</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>CPB-1V<br>CWR-F2 / CWR-F2R</td>
                            <td>VAS-V MV</td>
                            <td>CF-1W</td>
                        </tr>
                    </tbody>
                </table>
            </footer>
        </main>
    </div>
    <script src="purplegreen_JS.js"></script>
</body>
</html>
