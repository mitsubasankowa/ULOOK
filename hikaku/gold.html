<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1366, user-scalable=no">
    <title>MIRROR GOLD - ULOOK</title>
    <link rel="stylesheet" href="gold.css">
</head>
<body>
    <div class="bg-layer"></div>

    <div class="stage">
        <header class="nav-header">
            <a href="index.html" class="back-link">戻る</a>
        </header>

        <main>
            <section class="product-visual">
                <img src="../ULOOK/gold.png" class="lens-display-img" alt="ミラーゴールド">
            </section>

            <section class="product-titles">
                <h1 class="name-jp">ミラーゴールド</h1>
                <p class="name-en">MIRROR GOLD</p>
            </section>

            <section class="view-comparison" id="viewArea">
                <p class="guide-text">タップで装着ON・OFF切り替え</p>
                <div class="image-frame">
                    <img src="../miekata/miekata_ULOOK.png" class="view-img off" alt="装着OFF">
                    <img src="../miekata/miekata_ULOOK_gold.png" class="view-img on active" id="onImage" alt="装着ON">
                    <div class="toggle-badge is-on" id="badge">装着ON</div>
                </div>
            </section>
        </main>

        <footer class="compatibility-box">
            <h2 class="table-caption">対応機種</h2>
            <table class="spec-table single-col">
                <thead>
                    <tr>
                        <th>AGV</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>RACE3 / GT4</td>
                    </tr>
                </tbody>
            </table>
        </footer>
    </div>

    <script src="gold_JS.js"></script>
</body>
</html>
